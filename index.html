<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vidar Skogvoll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2eb;
      --text: #1a1a18;
      --muted: #7a7670;
      --accent: #2d5a3d;
      --border: #d8d4cb;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 3rem 2rem 2rem;
      border-bottom: 1px solid var(--border);
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    header p {
      margin-top: 0.6rem;
      color: var(--muted);
      font-style: italic;
      font-size: 1.05rem;
    }

    nav {
      margin-top: 1.4rem;
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      text-transform: lowercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    nav a:hover {
      border-bottom-color: var(--accent);
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      padding: 3rem 2rem;
      flex: 1;
    }

    section {
      margin-bottom: 3rem;
    }

    section h2 {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    section p {
      line-height: 1.75;
      font-size: 1.05rem;
      color: var(--text);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .links a::before {
      content: '→';
      font-size: 0.8rem;
    }

    .links a:hover {
      text-decoration: underline;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    footer p {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Vidar Skogvoll</h1>
    <p>Skriv en kort beskrivelse av deg selv her</p>
    <nav>
      <a href="/">hjem</a>
      <a href="/about.html">om meg</a>
      <a href="/projects.html">prosjekter</a>
    </nav>
  </header>

  <main>

    <section>
      <h2>Om meg</h2>
      <p>
        Skriv litt om hvem du er og hva du holder på med. Dette er forsiden – 
        hold det kort og personlig.
      </p>
    </section>

    <section>
      <h2>Lenker</h2>
      <div class="links">
        <a href="https://github.com/vidarsko">GitHub</a>
        <a href="mailto:din@epost.no">E-post</a>
        <!-- Legg til flere lenker her -->
      </div>
    </section>

  </main>

  <footer>
    <p>skogvoll.com</p>
  </footer>

</body>
</html>
